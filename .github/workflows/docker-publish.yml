name: Publish Docker images

on:
  push:
    branches: [release]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-rewaq-${{ github.ref }}
  cancel-in-progress: true

env:
  API_IMAGE_NAME: ghcr.io/fathah/rewaq
  WEB_IMAGE_NAME: ghcr.io/fathah/rewaq-web

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API image metadata
        id: api-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.API_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=release
            type=sha,prefix=release-

      - name: Build and publish API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}
          cache-from: type=gha,scope=rewaq-api
          cache-to: type=gha,mode=max,scope=rewaq-api

      - name: Generate web image metadata
        id: web-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=release
            type=sha,prefix=release-

      - name: Build and publish web image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          cache-from: type=gha,scope=rewaq-web
          cache-to: type=gha,mode=max,scope=rewaq-web
