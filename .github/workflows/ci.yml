name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Postgres with pgvector, matching the app's runtime image.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # globalSetup creates riwaq_test; tests connect here.
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/riwaq_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install dashboard dependencies
        working-directory: web
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Typecheck dashboard
        working-directory: web
        run: npm run typecheck
      - name: Test (isolation matrix + unit)
        run: npm test
      - name: Build dashboard
        working-directory: web
        run: npm run build
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
      - name: Dashboard production dependency audit
        working-directory: web
        run: npm audit --omit=dev --audit-level=high
      - name: Validate production Compose
        env:
          POSTGRES_PASSWORD: ci-password
          SECRET_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          END_USER_SIGNING_SECRET: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          ADMIN_TOKEN: ci-admin
          LLM_ALLOWED_HOSTS: api.openai.com
          ANTHROPIC_API_KEY: ci-key
        run: docker compose -f docker-compose.prod.yml config --quiet
      - name: Build production image
        run: docker build -t riwaq:ci .
      - name: Build dashboard image
        run: docker build -t riwaq-web:ci ./web
