# Development stack: Postgres (pgvector) + DragonflyDB + API with live reload.
# For production use docker-compose.prod.yml.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: riwaq
      POSTGRES_PASSWORD: riwaq
      POSTGRES_DB: riwaq
    ports:
      # Host 5433 to avoid clashing with a local Postgres on 5432. The API talks
      # to the DB over the compose network (db:5432), so this only affects host tools.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riwaq -d riwaq"]
      interval: 3s
      timeout: 3s
      retries: 20

  # DragonflyDB — Redis-compatible, multi-threaded. Backs durable jobs, caching,
  # and rate limiting. A drop-in for Redis with far better memory/CPU efficiency.
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    # BullMQ creates per-job keys inside Lua scripts instead of declaring every
    # generated key up front. Dragonfly rejects those scripts unless this
    # compatibility flag is enabled, leaving ingestion jobs unable to enqueue.
    command: ["--default_lua_flags=allow-undeclared-keys"]
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    volumes:
      - dragonflydata:/data

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      dragonfly:
        condition: service_started
    environment:
      # The runtime image defaults to production. Override it for this
      # live-reload development stack so production-only secrets are optional.
      NODE_ENV: development
      DATABASE_URL: postgres://riwaq:riwaq@db:5432/riwaq
      REDIS_URL: redis://dragonfly:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-anthropic}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      TELEGRAM_POLLING_ENABLED: ${TELEGRAM_POLLING_ENABLED:-1}
      CHANNEL_SESSION_IDLE_MINUTES: ${CHANNEL_SESSION_IDLE_MINUTES:-30}
      CHANNEL_SESSION_MAX_TURNS: ${CHANNEL_SESSION_MAX_TURNS:-20}
      PORT: 3000
    ports:
      - "${API_PORT:-3000}:3000"
    # Dev convenience: live-reload against local source.
    command: npm run dev
    volumes:
      - ./src:/app/src
      - modelcache:/app/.cache/huggingface

  web:
    build:
      context: ./web
    depends_on:
      api:
        condition: service_started
    environment:
      RIWAQ_API_URL: http://api:3000
      RIWAQ_PUBLIC_API_URL: ${RIWAQ_PUBLIC_API_URL:-http://localhost:3000}
      RIWAQ_API_KEY: ${RIWAQ_API_KEY:-}
      RIWAQ_ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      RIWAQ_DASHBOARD_TOKEN: ${RIWAQ_DASHBOARD_TOKEN:-}
    ports:
      - "${WEB_PORT:-3001}:3001"

volumes:
  pgdata:
  dragonflydata:
  modelcache:
